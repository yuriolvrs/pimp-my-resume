# What this file is: Cloudflare's config for the Worker — its name, entry
# point, and non-secret config values (LLM base URL/model, allowed CORS
# origins) exposed to the code as environment variables.
# In plain terms: settings for the proxy server that forwards requests to
# the LLM provider.

name = "anti-funemployment-proxy"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[vars]
# OpenAI-compatible base URL and model id for the initial provider (Groq
# free tier). Confirmed against https://console.groq.com/docs/openai and
# https://console.groq.com/docs/models at the time this was written --
# re-verify if the provider changes.
LLM_BASE_URL = "https://api.groq.com/openai/v1"
LLM_MODEL = "llama-3.1-8b-instant"
# Comma-separated list of origins allowed to call this proxy. Add the
# deployed Cloudflare Pages origin here once the frontend is deployed.
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174"

# LLM_API_KEY is a secret, not a var -- never put it here.
# Production: `wrangler secret put LLM_API_KEY`
# Local dev:  create worker/.dev.vars (gitignored) with LLM_API_KEY=...
